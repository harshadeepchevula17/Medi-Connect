# Application
spring.application.name=mediconnect
server.port=8080

# Development Database (H2 - zero setup)
spring.datasource.url=jdbc:h2:file:./data/mediconnect;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=Y29tcGxleC1zZWNyZXQta2V5LWZvci1tZWRpY29ubmVjdC1wbGF0Zm9ybS0yMDI2
jwt.expiration=86400000

# Groq AI (OpenAI-compatible)
groq.api.key=YOUR_GROQ_API_KEY
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket
spring.websocket.max-text-message-size=131072
spring.websocket.max-binary-message-size=131072
server.tomcat.websocket.max-text-message-size=131072
server.tomcat.websocket.max-binary-message-size=131072

